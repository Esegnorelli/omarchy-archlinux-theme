$activeBorderColor = rgb(1793d1)
$inactiveBorderColor = rgb(1c2333)
$shadowColor = 0xbb0d1117

general {
    col.active_border = $activeBorderColor rgb(00b4d8) 45deg
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 4
    gaps_out = 8
}

group {
    col.border_active = $activeBorderColor rgb(00b4d8) 45deg
    col.border_inactive = $inactiveBorderColor

    groupbar {
        font_size = 9
        col.active = 0xcc1793d1
        col.inactive = 0x661c2333
        gradients = true
        blur = true
        rounding = 0
        text_color = 0xffe0e6ed
    }
}

decoration {
    rounding = 0
    active_opacity = 0.96
    inactive_opacity = 0.82
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.08
    dim_special = 0.3

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = 0xcc0d1117
        color_inactive = 0x440d1117
        offset = 0, 6
        scale = 1.0
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.012
        contrast = 0.9
        brightness = 0.88
        vibrancy = 0.18
        vibrancy_darkness = 0.1
        special = true
        popups = true
        popups_ignorealpha = 0.2
        input_methods = true
        input_methods_ignorealpha = 0.2
    }
}

render {
    new_render_scheduling = true
}

animations {
    enabled = true

    bezier = archIn,  0.22, 1.0, 0.36, 1.0
    bezier = archOut, 0.36, 0,   0.66, -0.4
    bezier = archMove, 0.25, 1,  0.5,  1
    bezier = archBorder, 0.42, 0, 0.58, 1

    animation = windowsIn,   1, 4, archIn,   popin 85%
    animation = windowsOut,  1, 3, archOut,  popin 85%
    animation = windowsMove, 1, 3, archMove
    animation = fadeIn,      1, 3, archIn
    animation = fadeOut,     1, 3, archOut
    animation = fadeSwitch,  1, 4, archIn
    animation = fadeShadow,  1, 4, archIn
    animation = fadeDim,     1, 4, archIn
    animation = fadeLayers,  1, 3, archIn
    animation = border,      1, 8, archBorder
    animation = borderangle, 1, 24, archBorder, loop
    animation = workspaces,  1, 4, archMove, slidefade 15%
    animation = specialWorkspace, 1, 4, archMove, slidefade 15%
}

# Layer rules para blur na waybar e walker
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.3, match:namespace walker
layerrule = animation slide top, match:namespace walker

# Cursor
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
